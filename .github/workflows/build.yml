name: Build & Release (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options: [all, mac, windows, linux]
      release_name:
        description: "Release name (optional). If empty, will use 'Codex <version>'"
        required: false
        default: ""
      prerelease:
        description: "Create as prerelease?"
        required: false
        default: "false"

env:
  NODE_VERSION: "24"

jobs:
  build-mac:
    if: inputs.platform == 'all' || inputs.platform == 'mac'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          brew install --quiet sevenzip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: npm run build:mac-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg

  build-windows:
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          choco install 7zip -y
      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - run: node scripts/sync-upstream.js --force --skip-mac
      - run: node scripts/patch-all.js win
      - run: npm run build:win-x64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64
          path: out/*.zip

  build-linux:
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: npm run build:linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip

  publish:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version from package.json and set TAG
        id: read_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=Codex_$VERSION" >> $GITHUB_ENV
          if [ -z "${{ github.event.inputs.release_name }}" ]; then
            echo "RELEASE_NAME=Codex $VERSION" >> $GITHUB_ENV
          else
            echo "RELEASE_NAME=${{ github.event.inputs.release_name }}" >> $GITHUB_ENV
          fi
          echo "PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_ENV

      - name: Create GitHub Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ github.event.inputs.release_body }}
          prere](#)
